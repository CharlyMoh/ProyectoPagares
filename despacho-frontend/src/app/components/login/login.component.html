<div class="login-container">
    <div class="login-card">
        <h2>Sistema de Pagarés</h2>
        <p class="subtitle">Despacho Jurídico - Control de Accesos</p>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label>Correo Institucional</label>
                <input type="email" name="correo" [(ngModel)]="correo" required placeholder="ejemplo@despacho.com">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" [(ngModel)]="password" required placeholder="••••••••">
            </div>

            <div *ngIf="errorMessage" class="error-box">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>
    </div>
</div>
